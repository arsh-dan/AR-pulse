<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
    <nav class="header-left nav-links">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#" id="contactBtn">Contact us</a>
</nav>

    <div class="header-center logo">
        <img src="unnamede.png" alt="AR Brandpulse Logo">
    </div>

    <div class="header-right">
        <div class="social-handles">
            <a href="https://www.linkedin.com/company/ar-brandpulse/" target="_blank">
                <img src="linkedin.png" alt="LinkedIn" class="social-icon">
            </a>
            <a href="https://www.instagram.com/arbrandpulse/" target="_blank">
                <img src="instagram.png" alt="Instagram" class="social-icon">
            </a>
        </div>
        <div class="search-icon">🔍</div>
    </div>
      </header>

    <main class="content">
        </main>

        <div id="contactModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Get in Touch</h2>
        <p><strong>Email:</strong> <a href="mailto:arbrandpulse@gmail.com">arbrandpulse@gmail.com</a></p>
        <p><strong>Phone:</strong> <a href="tel:+917303624628">7303624628</a></p>
    </div>
</div>
<script>
    // 1. Grab all our elements from the HTML
    const modal = document.getElementById("contactModal");
    const contactBtn = document.getElementById("contactBtn");
    const closeBtn = document.querySelector(".close-btn");

    // 2. When the user clicks "Contact us", open the modal
    contactBtn.addEventListener("click", function(event) {
        event.preventDefault(); // Stops the page from jumping to the top
        modal.style.display = "flex"; // Changes from "none" to "flex" to show it
    });

    // 3. When the user clicks on the "X", close the modal
    closeBtn.addEventListener("click", function() {
        modal.style.display = "none";
    });

    // 4. When the user clicks anywhere on the dark background outside the white box, close it
    window.addEventListener("click", function(event) {
        if (event.target === modal) {
            modal.style.display = "none";
        }
    });
</script>
</body>
</html>
